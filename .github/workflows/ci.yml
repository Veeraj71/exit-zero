name: Exit-Zero CI Pipeline

# Trigger this workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    # Tell GitHub to spin up a fresh Ubuntu Linux virtual machine
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull down the repository code onto the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Python on the machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install the exact packages from requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run the linter to inspect code quality
    - name: Run Linter (Flake8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero style: check syntax rules with a standard line length constraint
        flake8 . --count --max-line-length=127 --statistics